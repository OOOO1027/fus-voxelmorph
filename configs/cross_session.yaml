# fUS-VoxelMorph 跨 Session 配准训练配置
# ============================================
# 基于 DL-Prep 冻结的 24 对跨 session anatomy-only 配对
# 默认使用 Training Mode B（rigid-prealigned input）

# ═══════════════════════════════════════════════════════════════════════════
# 数据配置
# ═══════════════════════════════════════════════════════════════════════════

data:
  # 数据类型: "cross_session" 使用 DL-Prep 冻结的预定义配对
  type: "cross_session"

  # 跨 session 数据根目录 (包含 DL-Prep bundle)
  cross_session_dir: "data/cross_session/"
  # 如果 bundle 在子目录中, 会自动搜索

  # 训练模式: "A" (raw) 或 "B" (rigid-prealigned, 推荐)
  training_mode: "B"

  # 是否使用 padded canonical 资产
  use_padded: true

  # 预处理配置
  # fUS Power Doppler 信号高度偏斜，推荐 percentile + log_transform
  normalize: "percentile"
  percentile: [1, 99]
  log_transform: true

  # 目标尺寸（null = 使用原始/padded 尺寸）
  target_size: null

  # ═══════════════════════════════════════════════════════════════════════
  # 数据增强配置
  # ═══════════════════════════════════════════════════════════════════════

  augmentation:
    enabled: true

    # 随机仿射变换
    affine:
      enabled: true
      rotation: 5             # 最大旋转角度（度）
      translation: 5          # 最大平移（像素）
      scale: [0.95, 1.05]     # 缩放范围
      p: 0.5                  # 应用概率

    # 随机强度噪声
    intensity:
      enabled: true
      noise_std: 0.02         # 高斯噪声标准差
      multiplicative_range: [0.95, 1.05]
      brightness_range: [-0.05, 0.05]
      p: 0.5

    # 随机裁剪
    crop:
      enabled: true
      scale: [0.9, 1.0]
      p: 0.3

    # 弹性变形（B-spline 风格）—— 最关键的增广
    elastic:
      enabled: true
      grid_size: 4            # 控制点网格边长（越小越平滑���
      magnitude: 8.0          # 最大位移幅度（像素），增大覆盖更多变形
      p: 0.5

    # 水平翻转
    flip:
      enabled: true
      p: 0.5

    # Gamma 校正（模拟不同 Power Doppler 增益）
    gamma:
      enabled: true
      range: [0.7, 1.3]
      p: 0.5

  # 反向配对：自动将每对 (A->B) 扩展为 (A->B) + (B->A)
  include_reverse: true

# ═══════════════════════════════════════════════════════════════════════════
# DataLoader 配置
# ═══════════════════════════════════════════════════════════════════════════

dataloader:
  batch_size: 4               # 小数据集建议小 batch
  num_workers: 2
  pin_memory: true
  drop_last: false            # 小数据集不丢弃最后 batch
  shuffle: true

# ═══════════════════════════════════════════════════════════════════════════
# 模型配置
# ═══════════════════════════════════════════════════════════════════════════

model:
  in_channels: 1
  enc_channels: [32, 64, 64, 64]
  dec_channels: [64, 64, 64, 32, 32, 16]
  integration_steps: 7        # diffeomorphic，保证拓扑正确
  bidir: true                 # 双向训练，有效翻倍训练对

# ═══════════════════════════════════════════════════════════════════════════
# 损失配置
# ═══════════════════════════════════════════════════════════════════════════

loss:
  similarity: "ms_ncc"
  ncc_win_size: 15              # 单尺度 NCC 后备
  ms_ncc:                       # 多尺度 NCC 配置
    scales: [1, 2, 4]
    win_sizes: [15, 9, 5]
    weights: [0.5, 0.3, 0.2]
  reg_type: "grad"
  reg_weight: 0.05            # 降低正则化，允许模型预测更大变形
  reg_penalty: "l2"
  bidir_weight: 1.0           # 双向损失权重
  mask_aware: true             # 启用 mask-aware 损失（避免 padding 干扰）

# ═══════════════════════════════════════════════════════════════════════════
# 训练配置
# ═══════════════════════════════════════════════════════════════════════════

train:
  epochs: 500                 # 小数据集需要更多 epoch
  lr: 1.0e-4
  weight_decay: 0.0
  lr_scheduler: "warmup_cosine"    # 带 warmup 的 cosine
  warmup_epochs: 20
  save_dir: "checkpoints/cross_session/runs/20260409_gpu_ms_ncc_337k/"  # 新 run 请复制并改成新目录，避免混写
  log_dir: "runs/cross_session/20260409_gpu_ms_ncc_337k/"
  log_interval: 5
  save_interval: 50
  early_stopping: 80          # patience
  accumulate_steps: 4          # 梯度累积步数，有效 batch_size = 4 * 4 = 16
  reg_schedule:                # 自适应正则化权重调度
    start: 0.01                # 前期低正则化，允许自由变形学习
    end: 0.1                   # 后期增大，收敛时约束平滑性
    warmup_fraction: 0.33      # 前 1/3 epochs 用 start 值
  swa:                         # 随机权重平均（提升泛化）
    enabled: true
    epochs: 30
    lr: 1.0e-5

# ═══════════════════════════════════════════════════════════════════════════
# 评估配置
# ═══════════════════════════════════════════════════════════════════════════

eval:
  # 三方对比: pre (配准前) / stage3b (刚体 backbone) / dl_output (模型输出)
  compare_stage3b: true
  load_stage3b: true
  output_dir: "results/cross_session/"

# ═══════════════════════════════════════════════════════════════════════════
# 合成数据预训练
# ═══════════════════════════════════════════════════════════════════════════

pretrain:
  enabled: true                # 启用合成数据预训练
  n_samples: 500               # 合成样本数（生成较慢，500 已足够）
  epochs: 50                   # 预训练轮数
  batch_size: 8
  lr: 1.0e-4
  flow_weight: 0.1             # 有监督 flow MSE 损失权重

# 设备
device: "cuda"
